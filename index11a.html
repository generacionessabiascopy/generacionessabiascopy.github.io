<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- =====================================================
       DEPENDENCIAS — versiones fijas, orden crítico
       1. A-Frame primero
       2. MindAR segundo (extiende A-Frame)
       3. aframe-extras tercero (extiende A-Frame)
  ====================================================== -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>

  <style>
    /* =====================================================
       RESET BASE
    ====================================================== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      /* TRANSPARENTE: Permite que el video inyectado por MindAR se vea al fondo */
      background: transparent;
    }

    /* =====================================================
       CONTENEDOR PRINCIPAL AR
    ====================================================== */
    #ar-container {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      overflow: hidden;
    }

    /* =====================================================
       OVERLAY DE TOQUE — pantalla completa
       El fondo oscuro vive aquí y se va por completo al tocar
    ====================================================== */
    #touch-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      /* Velo oscuro translúcido para dar contraste y dejar intuir la cámara de fondo */
      background: rgba(11, 11, 15, 0.55);
      backdrop-filter: blur(2px);
      cursor: pointer;
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }

    #touch-overlay.oculto {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    /* Perspectiva 3D para el contenedor del texto */
    #touch-overlay .texto-3d-wrapper {
      perspective: 600px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Texto CSS 3D — etéreo y luminoso */
    #touch-overlay .texto-3d {
      font-family: 'Palatino Linotype', Palatino, 'Book Antiqua', Georgia, serif;
      font-size: clamp(2.8rem, 8vw, 5rem);
      font-weight: 400;
      font-style: italic;
      color: #ffffff;
      letter-spacing: 0.08em;
      text-align: center;
      line-height: 1.3;

      /* Rotación 3D sutil — flota inclinado */
      transform: rotateX(12deg) rotateY(-4deg);
      transform-style: preserve-3d;

      /* Extrusión volumétrica con text-shadow en capas */
      text-shadow:
        0 1px 0 rgba(255,255,255,0.6),
        0 2px 0 rgba(200,200,255,0.4),
        0 3px 0 rgba(180,180,255,0.3),
        0 4px 0 rgba(160,160,255,0.2),
        0 5px 0 rgba(140,140,255,0.15),
        0 6px 0 rgba(120,120,255,0.1),
        0 8px 20px rgba(100,120,255,0.5),
        0 15px 40px rgba(80,100,255,0.3),
        0 25px 60px rgba(60,80,255,0.2);

      /* Animación de balanceo flotante */
      animation: flotar 4s ease-in-out infinite;
    }

    @keyframes flotar {
      0%   { transform: rotateX(12deg) rotateY(-4deg) translateY(0px); }
      50%  { transform: rotateX(8deg)  rotateY(4deg)  translateY(-12px); }
      100% { transform: rotateX(12deg) rotateY(-4deg) translateY(0px); }
    }

    /* Puntos suspensivos con pulso independiente */
    #touch-overlay .puntos {
      display: inline-block;
      animation: pulsoPuntos 1.5s ease-in-out infinite;
    }

    @keyframes pulsoPuntos {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    /* =====================================================
       OVERLAY DE ESCANEO
    ====================================================== */
    #example-scanning-overlay {
      display: flex;
      align-items: center;
      justify-content: center;
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      bottom: 0;
      background: transparent;
      z-index: 2;
      pointer-events: none;
    }

    #example-scanning-overlay.hidden {
      display: none;
    }

    @media (min-aspect-ratio: 1/1) {
      #example-scanning-overlay .inner {
        width: 50vh;
        height: 50vh;
      }
    }

    @media (max-aspect-ratio: 1/1) {
      #example-scanning-overlay .inner {
        width: 80vw;
        height: 80vw;
      }
    }

    #example-scanning-overlay .inner {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      background:
        linear-gradient(to right, white 10px, transparent 10px) 0 0,
        linear-gradient(to right, white 10px, transparent 10px) 0 100%,
        linear-gradient(to left, white 10px, transparent 10px) 100% 0,
        linear-gradient(to left, white 10px, transparent 10px) 100% 100%,
        linear-gradient(to bottom, white 10px, transparent 10px) 0 0,
        linear-gradient(to bottom, white 10px, transparent 10px) 100% 0,
        linear-gradient(to top, white 10px, transparent 10px) 0 100%,
        linear-gradient(to top, white 10px, transparent 10px) 100% 100%;
      background-repeat: no-repeat;
      background-size: 40px 40px;
    }

    #example-scanning-overlay img {
      opacity: 0.6;
      width: 90%;
      align-self: center;
    }

    #example-scanning-overlay .scanline {
      position: absolute;
      width: 100%;
      height: 10px;
      background: white;
      animation: scanMove 2s linear infinite;
    }

    @keyframes scanMove {
      0%, 100% { top: 0%; }
      50%       { top: calc(100% - 10px); }
    }

  </style>
</head>

<body>

  <!-- OVERLAY DE TOQUE — pantalla completa, texto CSS 3D -->
  <div id="touch-overlay">
    <div class="texto-3d-wrapper">
      <div class="texto-3d">
        Toca aquí<span class="puntos">...</span>
      </div>
    </div>
  </div>

  <!-- CONTENEDOR AR -->
  <div id="ar-container">

    <!-- OVERLAY DE ESCANEO -->
    <div id="example-scanning-overlay" class="hidden">
      <div class="inner">
        <img src="https://generacionessabiascopy.github.io/interactivos/card.png"
             alt="Apunta al marcador" />
        <div class="scanline"></div>
      </div>
    </div>

    <!-- =====================================================
         ESCENA A-FRAME / MINDAR
    ====================================================== -->
    <a-scene
      mindar-image="
        imageTargetSrc: https://generacionessabiascopy.github.io/interactivos/targets7.mind;
        autoStart: true;
        showStats: false;
        uiScanning: #example-scanning-overlay;
        maxTrack: 3
      "
      embedded
      color-space="sRGB"
      renderer="colorManagement: true; physicallyCorrectLights: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >

      <!-- =====================================================
           ASSETS — precarga completa, sin duplicados
      ====================================================== -->
      <a-assets>
        <!-- Imágenes UI -->
        <img crossorigin="anonymous" id="icon-web"
          src="https://generacionessabiascopy.github.io/interactivos/web.png" />
        <img crossorigin="anonymous" id="icon-left"
          src="https://generacionessabiascopy.github.io/interactivos/left.png" />
        <img crossorigin="anonymous" id="icon-right"
          src="https://generacionessabiascopy.github.io/interactivos/right.png" />

        <!-- Imágenes de contenido -->
        <img crossorigin="anonymous" id="combos"
          src="https://generacionessabiascopy.github.io/interactivos/combos.png" />
        <img crossorigin="anonymous" id="burgers-preview"
          src="https://generacionessabiascopy.github.io/interactivos/2burgers.png" />
        <img crossorigin="anonymous" id="todoterreno-preview"
          src="https://generacionessabiascopy.github.io/interactivos/todoterreno.png" />
        <img crossorigin="anonymous" id="portuguesa-preview"
          src="https://generacionessabiascopy.github.io/interactivos/portuguesa.png" />
        <img crossorigin="anonymous" id="coke-video-thumb"
          src="https://generacionessabiascopy.github.io/interactivos/corralVideo.png" />

        <!-- Video — playsinline para iOS -->
        <video
          crossorigin="anonymous"
          id="coke-video-mp4"
          src="https://generacionessabiascopy.github.io/interactivos/CorrarVideo.mp4"
          playsinline
          webkit-playsinline
          preload="auto"
        ></video>

        <!-- Audio — sin autoplay, sin ID duplicado -->
        <audio
          crossorigin="anonymous"
          id="mySound"
          src="https://generacionessabiascopy.github.io/interactivos/corralAudio.mp3"
          preload="auto"
        ></audio>

        <!-- Modelo 3D — UNA sola declaración para los 3 targets -->
        <a-asset-item
          id="modelo-principal"
          src="https://generacionessabiascopy.github.io/interactivos/corrarCapBIG.gltf"
        ></a-asset-item>
      </a-assets>

      <!-- CÁMARA con raycaster -->
      <a-camera
        position="0 0 0"
        look-controls="enabled: false"
        cursor="fuse: false; rayOrigin: mouse"
        raycaster="far: 10000; objects: .clickable"
      ></a-camera>

      <!-- =====================================================
           TARGET 0 — Audio + Modelo 3D
      ====================================================== -->
      <a-entity id="mytarget0" mindar-image-target="targetIndex: 0">
        <a-gltf-model
          id="modelo-t0"
          class="clickable"
          src="#modelo-principal"
          position="0 -0.25 0"
          scale="0.25 0.25 0.25"
          rotation="0 0 0"
          visible="false"
          animation-mixer="clip: *; loop: repeat"
        ></a-gltf-model>

        <a-sphere
          id="esfera-t0"
          class="clickable"
          radius="0.5"
          color="green"
          opacity="0.0"
          position="0 0.2 0.1"
        ></a-sphere>
      </a-entity>

      <!-- =====================================================
           TARGET 1 — Video comercial
      ====================================================== -->
      <a-entity id="mytarget1" mindar-image-target="targetIndex: 1">
        <a-gltf-model
          id="modelo-t1"
          class="clickable"
          src="#modelo-principal"
          position="0 -0.25 0"
          scale="0.25 0.25 0.25"
          rotation="0 0 0"
          visible="true"
          animation-mixer="clip: *; loop: repeat"
        ></a-gltf-model>

        <a-entity id="contenedor-video-t1" visible="false" position="0 0 0">
          <a-plane
            id="plano-video-t1"
            width="1"
            height="0.552"
            position="0 0 0"
            material="src: #coke-video-mp4; transparent: true"
          ></a-plane>
        </a-entity>

        <a-entity
          id="thumbnail-t1"
          class="clickable"
          geometry="primitive: plane; width: 1; height: 0.552"
          material="src: #coke-video-thumb; alpha-test: 0.5"
          position="0 0 0.01"
        ></a-entity>
      </a-entity>

      <!-- =====================================================
           TARGET 2 — Avatar + Portfolio + Botón web
      ====================================================== -->
      <a-entity id="mytarget2" mindar-image-target="targetIndex: 2">
        <a-plane src="#combos" position="0 0 0" height="0.552" width="1"></a-plane>

        <a-gltf-model
          id="avatar-t2"
          src="#modelo-principal"
          position="0 -0.25 -0.3"
          scale="0.25 0.25 0.25"
          rotation="0 0 0"
          visible="false"
          animation-mixer="clip: *; loop: repeat"
        ></a-gltf-model>

        <a-entity id="portfolio-panel" visible="false" position="0 -0.6 0.01">
          <a-entity id="portfolio-item0" visible="true">
            <a-image class="clickable" src="#burgers-preview" alpha-test="0.5" position="0 0 0" height="0.552" width="1"></a-image>
          </a-entity>
          <a-entity id="portfolio-item1" visible="false">
            <a-image class="clickable" src="#todoterreno-preview" alpha-test="0.5" position="0 0 0" height="0.552" width="1"></a-image>
          </a-entity>
          <a-entity id="portfolio-item2" visible="false">
            <a-image class="clickable" src="#portuguesa-preview" alpha-test="0.5" position="0 0 0" height="0.552" width="1"></a-image>
          </a-entity>

          <a-image id="btn-izquierda" class="clickable" src="#icon-left" position="-0.57 0 0" height="0.15" width="0.15" visible="false"></a-image>
          <a-image id="btn-derecha" class="clickable" src="#icon-right" position="0.57 0 0" height="0.15" width="0.15" visible="false"></a-image>
        </a-entity>

        <a-image
          id="btn-web"
          class="clickable"
          src="#icon-web"
          alpha-test="0.5"
          position="-0.14 -0.5 0"
          height="0.4"
          width="0.4"
          visible="false"
          animation="property: scale; from: 1 1 1; to: 1.2 1.2 1.2; dur: 1000; easing: easeInOutQuad; loop: true; dir: alternate"
        ></a-image>
      </a-entity>

    </a-scene>
  </div><!-- /ar-container -->


  <!-- =====================================================
       JAVASCRIPT
  ====================================================== -->
  <script>

    // =====================================================
    // COMPONENTE: target0-controller
    // =====================================================
    AFRAME.registerComponent("target0-controller", {
      init: function () {
        const modelo   = document.querySelector("#modelo-t0");
        const esfera   = document.querySelector("#esfera-t0");
        const audio    = document.querySelector("#mySound");
        const overlay  = document.querySelector("#example-scanning-overlay");

        this.el.addEventListener("targetFound", function () {
          console.log("Target 0 encontrado");
          overlay.classList.add("hidden");
          modelo.setAttribute("visible", false);
          esfera.setAttribute("color", "green");

          audio.currentTime = 0;
          audio.play().catch(function (err) {
            console.warn("Audio bloqueado:", err);
            modelo.setAttribute("visible", true);
            esfera.setAttribute("color", "red");
          });
        });

        this.el.addEventListener("targetLost", function () {
          console.log("Target 0 perdido");
          audio.pause();
          modelo.setAttribute("visible", false);
          esfera.setAttribute("color", "green");
          overlay.classList.remove("hidden");
        });

        audio.addEventListener("ended", function () {
          esfera.setAttribute("color", "green");
          modelo.setAttribute("visible", true);
          const mixer = modelo.components["animation-mixer"];
          if (mixer) mixer.play();
        });

        modelo.addEventListener("model-loaded", function () {
          const mixer = modelo.components["animation-mixer"];
          if (mixer) mixer.play();
        });

        function toggleReproduccion() {
          if (!audio.paused) {
            audio.pause();
            esfera.setAttribute("color", "red");
            modelo.setAttribute("visible", true);
            const mixer = modelo.components["animation-mixer"];
            if (mixer) mixer.pause();
          } else {
            audio.play().catch(function (err) {
              console.warn("No se pudo reanudar:", err);
            });
            esfera.setAttribute("color", "green");
            modelo.setAttribute("visible", false);
            const mixer = modelo.components["animation-mixer"];
            if (mixer) mixer.play();
          }
        }

        esfera.addEventListener("click", function (evt) {
          evt.stopPropagation();
          toggleReproduccion();
        });

        modelo.addEventListener("click", function (evt) {
          evt.stopPropagation();
          toggleReproduccion();
        });
      }
    });

    // =====================================================
    // COMPONENTE: target1-controller
    // =====================================================
    AFRAME.registerComponent("target1-controller", {
      init: function () {
        const modelo       = document.querySelector("#modelo-t1");
        const thumbnail    = document.querySelector("#thumbnail-t1");
        const contenedor   = document.querySelector("#contenedor-video-t1");
        const video        = document.querySelector("#coke-video-mp4");
        const overlay      = document.querySelector("#example-scanning-overlay");

        let videoListenerActivo = false;

        this.el.addEventListener("targetFound", function () {
          console.log("Target 1 encontrado");
          overlay.classList.add("hidden");
          modelo.setAttribute("visible", true);
          thumbnail.setAttribute("visible", true);
          contenedor.setAttribute("visible", false);

          if (!videoListenerActivo) {
            videoListenerActivo = true;

            thumbnail.addEventListener("click", function () {
              thumbnail.setAttribute("visible", false);
              modelo.setAttribute("visible", false);
              contenedor.setAttribute("visible", true);
              video.currentTime = 0;
              video.play().catch(function (err) {
                console.warn("Video bloqueado:", err);
                thumbnail.setAttribute("visible", true);
                modelo.setAttribute("visible", true);
                contenedor.setAttribute("visible", false);
              });
            });

            video.addEventListener("ended", function () {
              contenedor.setAttribute("visible", false);
              modelo.setAttribute("visible", true);
              thumbnail.setAttribute("visible", true);
            });
          }
        });

        this.el.addEventListener("targetLost", function () {
          console.log("Target 1 perdido");
          video.pause();
          video.currentTime = 0;
          contenedor.setAttribute("visible", false);
          thumbnail.setAttribute("visible", true);
          modelo.setAttribute("visible", true);
          overlay.classList.remove("hidden");
        });
      }
    });

    // =====================================================
    // COMPONENTE: target2-controller
    // =====================================================
    AFRAME.registerComponent("target2-controller", {
      init: function () {
        const avatar        = document.querySelector("#avatar-t2");
        const portfolio     = document.querySelector("#portfolio-panel");
        const btnIzquierda  = document.querySelector("#btn-izquierda");
        const btnDerecha    = document.querySelector("#btn-derecha");
        const btnWeb        = document.querySelector("#btn-web");
        const overlay       = document.querySelector("#example-scanning-overlay");

        const items = [
          document.querySelector("#portfolio-item0"),
          document.querySelector("#portfolio-item1"),
          document.querySelector("#portfolio-item2"),
        ];

        let currentItem  = 0;
        let animando     = false;
        let rafId        = null;

        function mostrarItem(index) {
          items.forEach(function (item, i) {
            item.setAttribute("visible", i === index);
          });
        }

        function animarAvatar(onDone) {
          const duracion = 750;
          const inicio   = performance.now();
          const zInicio  = -0.3;
          const zFin     =  0.3;

          function tick(ahora) {
            const progreso = Math.min((ahora - inicio) / duracion, 1);
            const z = zInicio + (zFin - zInicio) * progreso;
            avatar.setAttribute("position", "0 -0.25 " + z.toFixed(4));

            if (progreso < 1) {
              rafId = requestAnimationFrame(tick);
            } else {
              const mixer = avatar.components["animation-mixer"];
              if (mixer) mixer.play();
              onDone();
            }
          }
          rafId = requestAnimationFrame(tick);
        }

        function animarPortfolio(onDone) {
          const duracion = 750;
          const inicio   = performance.now();
          const yInicio  = -0.6;
          const yFin     =  0;

          portfolio.setAttribute("visible", true);

          function tick(ahora) {
            const progreso = Math.min((ahora - inicio) / duracion, 1);
            const y = yInicio + (yFin - yInicio) * progreso;
            portfolio.setAttribute("position", "0 " + y.toFixed(4) + " 0.01");

            if (progreso < 1) {
              rafId = requestAnimationFrame(tick);
            } else {
              onDone();
            }
          }
          rafId = requestAnimationFrame(tick);
        }

        function resetEstado() {
          if (rafId) {
            cancelAnimationFrame(rafId);
            rafId = null;
          }
          animando = false;
          currentItem = 0;
          avatar.setAttribute("visible", false);
          avatar.setAttribute("position", "0 -0.25 -0.3");
          portfolio.setAttribute("visible", false);
          portfolio.setAttribute("position", "0 -0.6 0.01");
          btnIzquierda.setAttribute("visible", false);
          btnDerecha.setAttribute("visible", false);
          mostrarItem(0);
          btnWeb.setAttribute("visible", false);
        }

        this.el.addEventListener("targetFound", function () {
          console.log("Target 2 encontrado");
          if (animando) return;
          animando = true;
          overlay.classList.add("hidden");

          avatar.setAttribute("position", "0 -0.25 -0.3");
          avatar.setAttribute("visible", true);
          portfolio.setAttribute("position", "0 -0.6 0.01");
          portfolio.setAttribute("visible", false);
          btnWeb.setAttribute("visible", false);

          animarAvatar(function () {
            setTimeout(function () {
              animarPortfolio(function () {
                avatar.setAttribute("visible", false);
                btnIzquierda.setAttribute("visible", true);
                btnDerecha.setAttribute("visible", true);
                animando = false;
                setTimeout(function () {
                  btnWeb.setAttribute("visible", true);
                }, 300);
              });
            }, 300);
          });
        });

        this.el.addEventListener("targetLost", function () {
          console.log("Target 2 perdido");
          resetEstado();
          overlay.classList.remove("hidden");
        });

        btnIzquierda.addEventListener("click", function () {
          currentItem = (currentItem + 1) % 3;
          mostrarItem(currentItem);
        });

        btnDerecha.addEventListener("click", function () {
          currentItem = (currentItem - 1 + 3) % 3;
          mostrarItem(currentItem);
        });

        btnWeb.addEventListener("click", function () {
          window.location.href = "https://pideenlinea.elcorral.com/";
        });
      }
    });

    // =====================================================
    // LÓGICA DE INICIO — CONTROL DE INTERACCIÓN INTEGRAL
    // =====================================================
    document.addEventListener("DOMContentLoaded", function () {
      const sceneEl      = document.querySelector("a-scene");
      const touchOverlay = document.querySelector("#touch-overlay");
      const scanOverlay  = document.querySelector("#example-scanning-overlay");
      const mytarget0    = document.querySelector("#mytarget0");
      const mytarget1    = document.querySelector("#mytarget1");
      const mytarget2    = document.querySelector("#mytarget2");

      let isStarted = false;

      // Inyectar controladores a los marcadores
      mytarget0.setAttribute("target0-controller", "");
      mytarget1.setAttribute("target1-controller", "");
      mytarget2.setAttribute("target2-controller", "");

      // Evento de toque maestro en pantalla completa
      touchOverlay.addEventListener("click", async function () {
        if (isStarted) return;
        isStarted = true;

        // 1. TRUCO DE AUDIO SILENCIOSO PARA DESBLOQUEAR iOS
        const audio = document.querySelector("#mySound");
        if (audio) {
          audio.muted = true;
          try {
            await audio.play();
            audio.pause();
          } catch (e) {
            console.error("Fallo el bypass de audio:", e);
          }
          audio.muted = false;
          audio.currentTime = 0;
        }

        // 2. DESPERTADOR DE VIDEO (Defensa contra la congelación de WebKit de iOS)
        // Busca cualquier elemento de video creado automáticamente por MindAR y despierta su flujo
        document.querySelectorAll("video").forEach(function(videoElement) {
          if (videoElement.id !== "coke-video-mp4") {
            videoElement.play().catch(function(err) {
              console.warn("No se pudo forzar el play de la cámara:", err);
            });
          }
        });

        // 3. DESVANECIMIENTO Y OCULTACIÓN DE LA CAPA INICIAL
        touchOverlay.classList.add("oculto");

        // 4. LEVANTAR EL OVERLAY DE ESCANEO
        scanOverlay.classList.remove("hidden");

      }, { once: true });

      // Monitoreo del estado del sistema de Realidad Aumentada
      sceneEl.addEventListener("arReady", function () {
        console.log("MindAR inicializado y corriendo de fondo con éxito.");
      });

      sceneEl.addEventListener("arError", function (event) {
        console.error("Error crítico de MindAR:", event);
        isStarted = false;
        touchOverlay.classList.remove("oculto");
        scanOverlay.classList.add("hidden");
        alert("Asegúrate de otorgar permisos de cámara y recargar la página.");
      });
    });

  </script>
</body>
</html>
